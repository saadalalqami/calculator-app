name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Buildozer dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        
    - name: Install Buildozer
      run: |
        pip3 install buildozer cython
        
    - name: Create Buildozer spec
      run: |
        buildozer init
        sed -i 's/^title = .*/title = Kivy Calculator/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = calculator/' buildozer.spec
        sed -i 's/^package.domain = .*/package.domain = org.calculator/' buildozer.spec
        sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
        sed -i 's/^requirements = .*/requirements = python3,kivy==2.3.0/' buildozer.spec
        sed -i 's/^android.api = .*/android.api = 31/' buildozer.spec
        sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
        
    - name: Build APK
      run: |
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Kivy-Calculator-APK
        path: bin/*.apk
